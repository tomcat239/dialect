<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>熊本弁AI 肥後っ子</title>
  <style>
    body { font-family: sans-serif; background: #e0f2f1; text-align: center; padding: 20px; }
    #aiImage { width: 200px; border-radius: 20px; border: 4px solid #fff; transition: 0.3s; }
    #message { min-height: 3em; margin: 20px; padding: 15px; background: #fff; border-radius: 10px; border: 2px solid #c62828; font-weight: bold; }
    button { font-size: 1.2em; padding: 15px 30px; border-radius: 30px; background: #c62828; color: white; border: none; cursor: pointer; box-shadow: 0 4px 0 #8e0000; }
    button:active { transform: translateY(2px); box-shadow: none; }
    button:disabled { background: #ccc; box-shadow: none; }
  </style>
</head>
<body>
  <h1>肥後っ子 AI</h1>
  <img id="aiImage" src="https://lh3.googleusercontent.com/d/15xWlq7nL6FmJDuSeeVYQr4Bqe5xqnNwq">
  <div id="message">ボタンば押して話し掛けてはいよ！</div>
  <button id="talkBtn" onclick="handleTalk()">🎤 お話しする</button>
  <script>
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwCLtfOU0ogrVTPbzOyQ4h9hV9gwWYRznZcZIpFgngjc764vRM8DHYmMbzeXat6akUo/exec";
    const talkBtn = document.getElementById("talkBtn");
    const messageDiv = document.getElementById("message");
    const aiImage = document.getElementById("aiImage");
    const imgStill = "https://lh3.googleusercontent.com/d/15xWlq7nL6FmJDuSeeVYQr4Bqe5xqnNwq";
    const imgTalk = "https://lh3.googleusercontent.com/d/131KY3qih_L2SCT7U-O5uw6o3-JJbau18";
    async function handleTalk() {
      talkBtn.disabled = true;
      messageDiv.textContent = "マイクば準備しよるバイ...";
      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Recognition) {
        messageDiv.textContent = "あたのブラウザは音声認識に対応しとらんごたっバイ。Chromeを使ってはいよ！";
        talkBtn.disabled = false;
        return;
      }
      const rec = new Recognition();
      rec.lang = "ja-JP";
      rec.onstart = () => { messageDiv.textContent = "🎤 聞きよるバイ！お話ししてはいよ。"; };
      rec.onresult = (e) => {
        const text = e.results[0][0].transcript;
        sendToGemini(text);
      };
      rec.onerror = (e) => {
        if (e.error === 'not-allowed') {
          messageDiv.innerHTML = "マイクのアクセスが拒否されたバイ。<br>ブラウザのURLバーの左側からマイクを許可してはいよ。";
        } else {
          messageDiv.textContent = "エラーが起きたバイ（" + e.error + "）。";
        }
        talkBtn.disabled = false;
      };
      rec.onend = () => {
        if (!messageDiv.textContent.includes("考え中")) talkBtn.disabled = false;
      };
      try { rec.start(); } catch (err) { talkBtn.disabled = false; }
    }
    function sendToGemini(text) {
      messageDiv.textContent = "🤔 「" + text + "」か... 考え中バイ...";
      fetch(GAS_WEBAPP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ message: text })
      })
      .then(response => response.json())
      .then(data => {
        messageDiv.textContent = data.reply;
        speak(data.reply);
      })
      .catch(error => {
        messageDiv.textContent = "通信に失敗したバイ。";
        talkBtn.disabled = false;
      });
    }
    function speak(text) {
      window.speechSynthesis.cancel();
      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = "ja-JP";
      uttr.onstart = () => { aiImage.src = imgTalk; };
      uttr.onend = () => { aiImage.src = imgStill; talkBtn.disabled = false; };
      window.speechSynthesis.speak(uttr);
    }
  </script>
</body>
</html>
